<!DOCTYPE html>
<html>
<head>
    <title>UpCode Franchise Search</title>
    <style>
        body { font-family: sans-serif; padding-top: 35px; padding-left: 50px; }
        h2 { margin-bottom: 30px; }
        .results-box { border: 1px solid #ccc; width: 400px; display: none; }
        .address-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .address-item:hover { background-color: #f0f0f0; }
    </style>
</head>
<body>

    <h2>Search US Addresses</h2>
    <input type="text" id="search" placeholder="Type in a US address..." style="width: 380px; padding: 10px;">
    
    <div id="results" class="results-box"></div>

    <script>
        const input = document.getElementById('search');
        const resultsBox = document.getElementById('results');

        input.addEventListener('input', async () => {
            const val = input.value;
            if (val.length < 3) {
                resultsBox.style.display = 'none';
                return;
            }

            console.log("Searching for:", val);

            try {
                const response = await fetch('/autocomplete?q=' + encodeURIComponent(val));
                const data = await response.json();
                
                if (data.results.length > 0) {
                    resultsBox.innerHTML = '';
                    resultsBox.style.display = 'block';
                    
                    data.results.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'address-item';
                        
                        div.innerText = item.display; 
                        
                        div.onclick = () => {
                            input.value = item.display;
                            resultsBox.style.display = 'none';
                        };
                        resultsBox.appendChild(div);
                    });
                }
            } catch (err) {
                console.error("Browser error:", err);
            }
        });
    </script>
</body>
</html>
